apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: vermeg
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: vermeg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.36
          command:
            - sh
            - -c
            - until wget -q -O - http://keycloak:8080/realms/vermeg-sirh/.well-known/openid-configuration >/dev/null; do echo waiting for keycloak oidc; sleep 5; done
      containers:
        - name: api-gateway
          image: docker.io/2025omar/vermeg-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: vermeg-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
