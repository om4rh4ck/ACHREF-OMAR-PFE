apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: vermeg
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: vermeg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          imagePullPolicy: IfNotPresent
          args:
            - start-dev
            - --import-realm
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: vermeg-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vermeg-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/vermeg_sirh
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vermeg-secrets
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vermeg-secrets
                  key: POSTGRES_PASSWORD
            - name: KC_PROXY
              value: edge
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          startupProbe:
            httpGet:
              path: /realms/vermeg-sirh
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /realms/vermeg-sirh
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /realms/vermeg-sirh
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
