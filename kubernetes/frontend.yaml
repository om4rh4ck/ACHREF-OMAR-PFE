apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: vermeg
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30173
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vermeg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-api-gateway
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z api-gateway 8081; do echo waiting for api-gateway; sleep 2; done
      containers:
        - name: frontend
          image: docker.io/2025omar/vermeg-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
