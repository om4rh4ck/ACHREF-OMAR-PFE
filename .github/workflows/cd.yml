name: cd

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deployment target"
        required: true
        default: "docker"
        type: choice
        options:
          - docker
          - kubernetes

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: employee-service
            context: backend/employee-service
            dockerfile: backend/employee-service/Dockerfile
          - name: recruitment-service
            context: backend/recruitment-service
            dockerfile: backend/recruitment-service/Dockerfile
          - name: approval-service
            context: backend/approval-service
            dockerfile: backend/approval-service/Dockerfile
          - name: api-gateway
            context: backend/api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - name: frontend
            context: front
            dockerfile: front/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vermeg-${{ matrix.image.name }}:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vermeg-${{ matrix.image.name }}:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_target == 'docker' }}
    env:
      DEPLOY_STRATEGY: ${{ secrets.DEPLOY_STRATEGY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (self-hosted)
        run: |
          chmod +x deploy/blue-green.sh deploy/rolling.sh
          if [ "$DEPLOY_STRATEGY" = "rolling" ]; then
            ./deploy/rolling.sh "${{ github.ref_name }}"
          else
            ./deploy/blue-green.sh "${{ github.ref_name }}"
          fi

  deploy-kubernetes:
    runs-on: self-hosted
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'kubernetes' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Validate kubeconfig format
        if: ${{ secrets.KUBE_CONFIG_DATA != '' }}
        shell: bash
        run: |
          if grep -Eq 'client-certificate:|client-key:|certificate-authority:' "$HOME/.kube/config"; then
            echo "KUBE_CONFIG_DATA contains local file paths and is not portable."
            echo "Generate it with:"
            echo "kubectl config view --flatten --minify --raw | base64 -w 0"
            exit 1
          fi

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Deploy manifests
        run: kubectl apply -k kubernetes

      - name: Wait for PostgreSQL
        run: kubectl rollout status statefulset/postgres -n vermeg --timeout=180s

      - name: Wait for application deployments
        shell: bash
        run: |
          kubectl wait --for=condition=Available deployment/keycloak -n vermeg --timeout=240s
          kubectl wait --for=condition=Available deployment/employee-service -n vermeg --timeout=240s
          kubectl wait --for=condition=Available deployment/recruitment-service -n vermeg --timeout=240s
          kubectl wait --for=condition=Available deployment/approval-service -n vermeg --timeout=240s
          kubectl wait --for=condition=Available deployment/api-gateway -n vermeg --timeout=240s
          kubectl wait --for=condition=Available deployment/frontend -n vermeg --timeout=240s

      - name: Show deployed resources
        run: kubectl get all -n vermeg
