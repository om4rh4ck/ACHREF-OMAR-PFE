name: cd

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: employee-service
            context: backend/employee-service
            dockerfile: backend/employee-service/Dockerfile
          - name: recruitment-service
            context: backend/recruitment-service
            dockerfile: backend/recruitment-service/Dockerfile
          - name: approval-service
            context: backend/approval-service
            dockerfile: backend/approval-service/Dockerfile
          - name: api-gateway
            context: backend/api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - name: frontend
            context: front
            dockerfile: front/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vermeg-${{ matrix.image.name }}:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vermeg-${{ matrix.image.name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.SSH_HOST != '' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x deploy/blue-green.sh
            ./deploy/blue-green.sh "${{ github.ref_name }}"
