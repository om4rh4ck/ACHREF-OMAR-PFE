name: cd

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deployment target"
        required: true
        default: "docker"
        type: choice
        options:
          - docker
          - kubernetes

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: employee-service
            context: backend/employee-service
            dockerfile: backend/employee-service/Dockerfile
          - name: recruitment-service
            context: backend/recruitment-service
            dockerfile: backend/recruitment-service/Dockerfile
          - name: approval-service
            context: backend/approval-service
            dockerfile: backend/approval-service/Dockerfile
          - name: api-gateway
            context: backend/api-gateway
            dockerfile: backend/api-gateway/Dockerfile
          - name: frontend
            context: front
            dockerfile: front/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vermeg-${{ matrix.image.name }}:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vermeg-${{ matrix.image.name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vermeg-${{ matrix.image.name }}:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_target == 'docker' }}
    env:
      DEPLOY_STRATEGY: ${{ secrets.DEPLOY_STRATEGY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (self-hosted)
        run: |
          chmod +x deploy/blue-green.sh deploy/rolling.sh
          if [ "$DEPLOY_STRATEGY" = "rolling" ]; then
            ./deploy/rolling.sh "${{ github.ref_name }}"
          else
            ./deploy/blue-green.sh "${{ github.ref_name }}"
          fi

  deploy-kubernetes:
    runs-on: self-hosted
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'kubernetes' }}
    env:
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      IMAGE_TAG: ${{ github.sha }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig when provided
        shell: bash
        run: |
          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "KUBE_CONFIG_DATA not provided, using runner local kubectl context."
            exit 0
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          if grep -Eq 'client-certificate:|client-key:|certificate-authority:' "$HOME/.kube/config"; then
            echo "KUBE_CONFIG_DATA contains local file paths and is not portable."
            echo "Generate it with:"
            echo "kubectl config view --flatten --minify --raw | base64 -w 0"
            exit 1
          fi

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Deploy manifests
        run: kubectl apply -k kubernetes

      - name: Update application images to current build
        shell: bash
        run: |
          kubectl set image deployment/employee-service employee-service=${DOCKERHUB_USERNAME}/vermeg-employee-service:${IMAGE_TAG} -n vermeg
          kubectl set image deployment/recruitment-service recruitment-service=${DOCKERHUB_USERNAME}/vermeg-recruitment-service:${IMAGE_TAG} -n vermeg
          kubectl set image deployment/approval-service approval-service=${DOCKERHUB_USERNAME}/vermeg-approval-service:${IMAGE_TAG} -n vermeg
          kubectl set image deployment/api-gateway api-gateway=${DOCKERHUB_USERNAME}/vermeg-api-gateway:${IMAGE_TAG} -n vermeg
          kubectl set image deployment/frontend frontend=${DOCKERHUB_USERNAME}/vermeg-frontend:${IMAGE_TAG} -n vermeg

      - name: Wait for PostgreSQL
        run: kubectl rollout status statefulset/postgres -n vermeg --timeout=180s

      - name: Wait for application deployments
        shell: bash
        run: |
          kubectl rollout status deployment/keycloak -n vermeg --timeout=300s
          kubectl rollout status deployment/employee-service -n vermeg --timeout=420s
          kubectl rollout status deployment/recruitment-service -n vermeg --timeout=420s
          kubectl rollout status deployment/approval-service -n vermeg --timeout=420s
          kubectl rollout status deployment/api-gateway -n vermeg --timeout=420s
          kubectl rollout status deployment/frontend -n vermeg --timeout=300s

      - name: Diagnostics on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "=== kubectl get all ==="
          kubectl get all -n vermeg || true
          echo "=== kubectl describe deployments ==="
          kubectl describe deployment employee-service -n vermeg || true
          kubectl describe deployment recruitment-service -n vermeg || true
          kubectl describe deployment approval-service -n vermeg || true
          kubectl describe deployment api-gateway -n vermeg || true
          kubectl describe deployment frontend -n vermeg || true
          kubectl describe deployment keycloak -n vermeg || true
          echo "=== kubectl describe pods ==="
          kubectl describe pods -n vermeg || true
          echo "=== employee-service logs ==="
          kubectl logs deployment/employee-service -n vermeg --tail=200 || true
          echo "=== recruitment-service logs ==="
          kubectl logs deployment/recruitment-service -n vermeg --tail=200 || true
          echo "=== approval-service logs ==="
          kubectl logs deployment/approval-service -n vermeg --tail=200 || true
          echo "=== api-gateway logs ==="
          kubectl logs deployment/api-gateway -n vermeg --tail=200 || true
          echo "=== keycloak logs ==="
          kubectl logs deployment/keycloak -n vermeg --tail=200 || true

      - name: Show deployed resources
        run: kubectl get all -n vermeg
