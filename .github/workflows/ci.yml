name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  secrets-detection:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks secret scan
        uses: gitleaks/gitleaks-action@v2
        id: gitleaks
        with:
          source: .
          verbose: true
          fail: false
          exit-code: 0
        continue-on-error: true

      - name: Generate GitLeaks report
        if: always()
        run: |
          mkdir -p reports/security
          cat > reports/security/gitleaks-report.txt <<EOF
          GitLeaks Secret Scan Report
          ============================
          Status: Completed $([ "${{ steps.gitleaks.outcome }}" = "success" ] && echo "✓" || echo "✗")
          Timestamp: $(date)
          
          For detailed GitLeaks results, check GitHub's Security tab.
          To prevent secrets in future commits:
          1. Use GitHub Secrets for sensitive data
          2. Use .gitignore for local config files
          3. Use pre-commit hooks with gitleaks locally
          EOF

  backend-build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - employee-service
          - recruitment-service
          - approval-service
          - api-gateway
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test + Coverage
        run: mvn -q verify

  frontend-build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  sonar:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]') }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORG: ${{ secrets.SONAR_ORG }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud scan (single project)
        uses: SonarSource/sonarcloud-github-action@v2
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_PROJECT_KEY != '' && env.SONAR_ORG != '' && env.SONAR_HOST_URL != '' }}
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.sources=backend,front
            -Dsonar.exclusions=**/target/**,**/dist/**,**/node_modules/**,**/.angular/**,**/coverage/**

  security-reports:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]') }}
    permissions:
      contents: write
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare reports folder
        run: |
          mkdir -p reports/security

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: OWASP skipped (missing NVD_API_KEY)
        if: ${{ env.NVD_API_KEY == '' }}
        run: |
          cat > reports/security/dependency-check-employee-service.html <<'EOF'
          <html><body><h1>OWASP Dependency-Check</h1><p>NVD_API_KEY manquant. Ajoutez le secret NVD_API_KEY pour générer un vrai rapport.</p></body></html>
          EOF
          cp reports/security/dependency-check-employee-service.html reports/security/dependency-check-recruitment-service.html
          cp reports/security/dependency-check-employee-service.html reports/security/dependency-check-approval-service.html
          cp reports/security/dependency-check-employee-service.html reports/security/dependency-check-api-gateway.html

      - name: OWASP Dependency-Check (employee-service)
        if: ${{ env.NVD_API_KEY != '' }}
        working-directory: backend/employee-service
        continue-on-error: true
        run: mvn -q -DskipTests org.owasp:dependency-check-maven:8.4.0:check -Dformat=HTML -DoutputDirectory=../../reports/security -DreportName=dependency-check-employee-service -DnvdApiKey=${{ env.NVD_API_KEY }}

      - name: OWASP Dependency-Check (recruitment-service)
        if: ${{ env.NVD_API_KEY != '' }}
        working-directory: backend/recruitment-service
        continue-on-error: true
        run: mvn -q -DskipTests org.owasp:dependency-check-maven:8.4.0:check -Dformat=HTML -DoutputDirectory=../../reports/security -DreportName=dependency-check-recruitment-service -DnvdApiKey=${{ env.NVD_API_KEY }}

      - name: OWASP Dependency-Check (approval-service)
        if: ${{ env.NVD_API_KEY != '' }}
        working-directory: backend/approval-service
        continue-on-error: true
        run: mvn -q -DskipTests org.owasp:dependency-check-maven:8.4.0:check -Dformat=HTML -DoutputDirectory=../../reports/security -DreportName=dependency-check-approval-service -DnvdApiKey=${{ env.NVD_API_KEY }}

      - name: OWASP Dependency-Check (api-gateway)
        if: ${{ env.NVD_API_KEY != '' }}
        working-directory: backend/api-gateway
        continue-on-error: true
        run: mvn -q -DskipTests org.owasp:dependency-check-maven:8.4.0:check -Dformat=HTML -DoutputDirectory=../../reports/security -DreportName=dependency-check-api-gateway -DnvdApiKey=${{ env.NVD_API_KEY }}

      - name: npm audit (frontend)
        working-directory: front
        continue-on-error: true
        run: |
          npm ci
          npm audit > ../reports/security/npm-audit.txt || true

      - name: Install Trivy
        continue-on-error: true
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget curl
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Build images for Trivy scan
        continue-on-error: true
        run: |
          docker build -t vermeg-employee-service:scan -f backend/employee-service/Dockerfile backend/employee-service || echo "Build failed"
          docker build -t vermeg-recruitment-service:scan -f backend/recruitment-service/Dockerfile backend/recruitment-service || echo "Build failed"
          docker build -t vermeg-approval-service:scan -f backend/approval-service/Dockerfile backend/approval-service || echo "Build failed"
          docker build -t vermeg-api-gateway:scan -f backend/api-gateway/Dockerfile backend/api-gateway || echo "Build failed"
          docker build -t vermeg-frontend:scan -f front/Dockerfile front || echo "Build failed"

      - name: Trivy version check
        continue-on-error: true
        run: trivy version

      - name: Trivy image scan (employee-service)
        continue-on-error: true
        run: |
          mkdir -p reports/security
          trivy image --format json --output /tmp/employee-scan.json vermeg-employee-service:scan || true
          echo "<html><body><h2>Employee Service Scan</h2><pre>$(cat /tmp/employee-scan.json 2>/dev/null || echo 'Scan failed')</pre></body></html>" > reports/security/trivy-employee-service.html

      - name: Trivy image scan (recruitment-service)
        continue-on-error: true
        run: |
          trivy image --format json --output /tmp/recruitment-scan.json vermeg-recruitment-service:scan || true
          echo "<html><body><h2>Recruitment Service Scan</h2><pre>$(cat /tmp/recruitment-scan.json 2>/dev/null || echo 'Scan failed')</pre></body></html>" > reports/security/trivy-recruitment-service.html

      - name: Trivy image scan (approval-service)
        continue-on-error: true
        run: |
          trivy image --format json --output /tmp/approval-scan.json vermeg-approval-service:scan || true
          echo "<html><body><h2>Approval Service Scan</h2><pre>$(cat /tmp/approval-scan.json 2>/dev/null || echo 'Scan failed')</pre></body></html>" > reports/security/trivy-approval-service.html

      - name: Trivy image scan (api-gateway)
        continue-on-error: true
        run: |
          trivy image --format json --output /tmp/gateway-scan.json vermeg-api-gateway:scan || true
          echo "<html><body><h2>API Gateway Scan</h2><pre>$(cat /tmp/gateway-scan.json 2>/dev/null || echo 'Scan failed')</pre></body></html>" > reports/security/trivy-api-gateway.html

      - name: Trivy image scan (frontend)
        continue-on-error: true
        run: |
          trivy image --format json --output /tmp/frontend-scan.json vermeg-frontend:scan || true
          echo "<html><body><h2>Frontend Scan</h2><pre>$(cat /tmp/frontend-scan.json 2>/dev/null || echo 'Scan failed')</pre></body></html>" > reports/security/trivy-frontend.html

      - name: Snyk (backend + frontend)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN manquant, scan ignore." > reports/security/snyk-backend.txt
            echo "SNYK_TOKEN manquant, scan ignore." > reports/security/snyk-frontend.txt
            exit 0
          fi
          npm install -g snyk
          snyk auth "$SNYK_TOKEN"
          cd backend/employee-service && snyk test > ../../reports/security/snyk-backend.txt || true
          cd ../../front && snyk test > ../reports/security/snyk-frontend.txt || true

      - name: Aggregate real security scan results
        continue-on-error: true
        run: |
          python3 scripts/aggregate-security-results.py

      - name: Generate professional PDF reports
        continue-on-error: true
        run: |
          python3 -m pip install -q reportlab
          python3 scripts/generate-security-pdf.py

      - name: Generate security insights with recommendations
        continue-on-error: true
        run: |
          python3 scripts/analyze-security-insights.py

      - name: Create latest metrics snapshot
        continue-on-error: true
        run: |
          mkdir -p reports/security
          python3 <<'PYTHON_EOF'
          import json
          from datetime import datetime
          from pathlib import Path
          
          reports_dir = Path("reports/security")
          
          # Parse latest vulnerabilities
          critical = high = medium = low = 0
          
          for report_file in reports_dir.glob("*.html"):
              if 'trivy' in report_file.name or 'dependency-check' in report_file.name:
                  content = report_file.read_text(errors='ignore')
                  critical += content.count('CRITICAL') + content.count('critical')
                  high += content.count('HIGH') + content.count('high')
                  medium += content.count('MEDIUM') + content.count('medium')
                  low += content.count('LOW') + content.count('low')
          
          metrics = {
              'timestamp': datetime.now().isoformat(),
              'critical': critical,
              'high': high,
              'medium': medium,
              'low': low,
              'total': critical + high + medium + low
          }
          
          (reports_dir / "latest-metrics.json").write_text(json.dumps(metrics, indent=2))
          print(f"✅ Metrics: Critical={critical}, High={high}, Medium={medium}, Low={low}")
          PYTHON_EOF

      - name: Commit reports
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/security
          git diff --staged --quiet && echo "No report changes" && exit 0
          git commit -m "chore: update security reports with PDFs and insights [skip ci]"
          git push

  docker-push:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, security-reports]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]') }}
    env:
      REGISTRY: docker.io
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "COMMIT_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Employee Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/employee-service
          file: ./backend/employee-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-employee-service:latest
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-employee-service:${{ steps.meta.outputs.COMMIT_SHORT }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Recruitment Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/recruitment-service
          file: ./backend/recruitment-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-recruitment-service:latest
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-recruitment-service:${{ steps.meta.outputs.COMMIT_SHORT }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Approval Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/approval-service
          file: ./backend/approval-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-approval-service:latest
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-approval-service:${{ steps.meta.outputs.COMMIT_SHORT }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          file: ./backend/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-api-gateway:latest
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-api-gateway:${{ steps.meta.outputs.COMMIT_SHORT }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/vermeg-frontend:${{ steps.meta.outputs.COMMIT_SHORT }}
          labels: |
            org.opencontainers.image.created=${{ steps.meta.outputs.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}

  semantic-versioning:
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]') }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.semver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latesttag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: semver
        env:
          CURRENT_TAG: ${{ steps.latesttag.outputs.tag }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          CURRENT_TAG="${CURRENT_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_TAG"
          
          if echo "$COMMIT_MESSAGE" | grep -q "BREAKING\|major\|breaking"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MESSAGE" | grep -q "feat:\|feature"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          VERSION="$MAJOR.$MINOR.$PATCH"
          TAG="v$VERSION"
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📌 Next version: $TAG"

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.semver.outputs.tag }} -m "Release ${{ steps.semver.outputs.tag }}"
          git push https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ steps.semver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-ssh:
    runs-on: ubuntu-latest
    needs: [semantic-versioning]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip ci]') }}
    env:
      DEPLOY_VERSION: ${{ needs.semantic-versioning.outputs.version }}
      DEPLOY_TAG: ${{ needs.semantic-versioning.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Blue/Green strategy
        uses: appleboy/ssh-action@master
        continue-on-error: true
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin master
            git fetch --tags
            
            echo "🚀 Deploying version: ${{ env.DEPLOY_VERSION }}"
            echo "📌 Tag: ${{ env.DEPLOY_TAG }}"
            
            # Execute Blue/Green deployment
            bash deploy/blue-green.sh ${{ env.DEPLOY_TAG }}
            
            echo "⏳ Waiting for services..."
            sleep 10
            
            # Health checks
            echo "🔍 Running health checks..."
            
            FRONTEND_URL="http://localhost:5173"
            KEYCLOAK_URL="http://localhost:8080"
            GATEWAY_URL="http://localhost:8081/actuator/health"
            
            for url in "$FRONTEND_URL" "$KEYCLOAK_URL" "$GATEWAY_URL"; do
              echo "Checking: $url"
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "✅ $url is healthy"
              else
                echo "⚠️ $url is not responding yet"
              fi
            done
            
            echo "✅ Blue/Green deployment completed!"
            echo "✅ Version: ${{ env.DEPLOY_VERSION }}"
            echo "✅ Deployed at: $(date)"

      - name: Notify deployment
        if: success()
        run: |
          echo "🎉 Successfully deployed version ${{ env.DEPLOY_VERSION }}"
          echo "📌 Git tag: ${{ env.DEPLOY_TAG }}"
          echo "🔗 Commit: ${{ github.sha }}"
