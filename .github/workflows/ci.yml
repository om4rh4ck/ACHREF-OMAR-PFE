name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - employee-service
          - recruitment-service
          - approval-service
          - api-gateway
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test + Coverage
        run: mvn -q verify

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  sonar:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: SonarQube (Maven) - employee-service
        working-directory: backend/employee-service
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_ORG" ]; then
            echo "SonarQube skipped: missing SONAR_TOKEN, SONAR_HOST_URL, or SONAR_ORG."
            exit 0
          fi
          mvn -q -DskipTests -Dsonar.projectKey=vermeg-employee -Dsonar.organization="$SONAR_ORG" -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN" sonar:sonar

      - name: SonarQube (Maven) - recruitment-service
        working-directory: backend/recruitment-service
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_ORG" ]; then
            echo "SonarQube skipped: missing SONAR_TOKEN, SONAR_HOST_URL, or SONAR_ORG."
            exit 0
          fi
          mvn -q -DskipTests -Dsonar.projectKey=vermeg-recruitment -Dsonar.organization="$SONAR_ORG" -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN" sonar:sonar

      - name: SonarQube (Maven) - approval-service
        working-directory: backend/approval-service
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_ORG" ]; then
            echo "SonarQube skipped: missing SONAR_TOKEN, SONAR_HOST_URL, or SONAR_ORG."
            exit 0
          fi
          mvn -q -DskipTests -Dsonar.projectKey=vermeg-approval -Dsonar.organization="$SONAR_ORG" -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN" sonar:sonar

      - name: SonarQube (Maven) - api-gateway
        working-directory: backend/api-gateway
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORG: ${{ secrets.SONAR_ORG }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ] || [ -z "$SONAR_ORG" ]; then
            echo "SonarQube skipped: missing SONAR_TOKEN, SONAR_HOST_URL, or SONAR_ORG."
            exit 0
          fi
          mvn -q -DskipTests -Dsonar.projectKey=vermeg-gateway -Dsonar.organization="$SONAR_ORG" -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.login="$SONAR_TOKEN" sonar:sonar
