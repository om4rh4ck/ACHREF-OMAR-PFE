name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - employee-service
          - recruitment-service
          - approval-service
          - api-gateway
    defaults:
      run:
        working-directory: backend/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test + Coverage
        run: mvn -q verify

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  sonar:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Sonar disabled (missing secrets)
        if: ${{ secrets.SONAR_TOKEN == '' || secrets.SONAR_HOST_URL == '' }}
        run: echo "SonarQube skipped: missing SONAR_TOKEN or SONAR_HOST_URL secrets."

      - name: SonarQube (Maven) - employee-service
        working-directory: backend/employee-service
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: mvn -q -DskipTests -Dsonar.projectKey=vermeg-employee -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.login=${{ secrets.SONAR_TOKEN }} sonar:sonar

      - name: SonarQube (Maven) - recruitment-service
        working-directory: backend/recruitment-service
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: mvn -q -DskipTests -Dsonar.projectKey=vermeg-recruitment -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.login=${{ secrets.SONAR_TOKEN }} sonar:sonar

      - name: SonarQube (Maven) - approval-service
        working-directory: backend/approval-service
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: mvn -q -DskipTests -Dsonar.projectKey=vermeg-approval -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.login=${{ secrets.SONAR_TOKEN }} sonar:sonar

      - name: SonarQube (Maven) - api-gateway
        working-directory: backend/api-gateway
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        run: mvn -q -DskipTests -Dsonar.projectKey=vermeg-gateway -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.login=${{ secrets.SONAR_TOKEN }} sonar:sonar
